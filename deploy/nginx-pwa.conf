worker_processes 1;
pid /tmp/notesflash-pwa-nginx.pid;
error_log /home/ubuntu/code/notesflash/deploy/nginx-error.log warn;

events {
    worker_connections 256;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    access_log off;
    sendfile on;
    tcp_nopush on;
    keepalive_timeout 30;
    server_tokens off;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json application/manifest+json image/svg+xml;

    server {
        listen 127.0.0.1:4174;
        server_name _;
        root /home/ubuntu/code/notesflash/dist;
        index index.html;

        add_header X-Content-Type-Options nosniff always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

        location = /sw.js {
            try_files $uri =404;
            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
            add_header Service-Worker-Allowed "/" always;
        }

        location = /registerSW.js {
            try_files $uri =404;
            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        }

        location = /manifest.webmanifest {
            try_files $uri =404;
            default_type application/manifest+json;
            add_header Cache-Control "no-cache" always;
        }

        location /assets/ {
            try_files $uri =404;
            expires 1y;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        location / {
            try_files $uri $uri/ /index.html;
            add_header Cache-Control "no-cache";
        }
    }
}
