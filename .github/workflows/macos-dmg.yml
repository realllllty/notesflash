name: Build macOS DMG

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: macos-dmg-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-universal-dmg:
    name: Universal macOS DMG
    runs-on: macos-latest
    env:
      APPLE_SIGNING_IDENTITY: "-"
      MACOSX_DEPLOYMENT_TARGET: "11.0"
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install dependencies
        run: npm ci

      - name: Check frontend
        run: npm run check

      - name: Run tests
        run: npm run test:run

      - name: Run Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Build universal DMG
        run: npm run tauri -- build --target universal-apple-darwin --bundles dmg --ci

      - name: Generate SHA-256 checksum
        shell: bash
        run: |
          dmg_path="$(find src-tauri/target/universal-apple-darwin/release/bundle/dmg -maxdepth 1 -name '*.dmg' -print -quit)"
          test -n "$dmg_path"
          shasum -a 256 "$dmg_path" > "$dmg_path.sha256"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: NotesFlash-macOS-universal
          path: |
            src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
            src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg.sha256
          if-no-files-found: error

      - name: Publish GitHub prerelease
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          prerelease: true
          generate_release_notes: true
          files: |
            src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
            src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg.sha256
          body: |
            Universal macOS test build for Apple Silicon and Intel Macs.

            Requirements: macOS 11.0 or later.

            This build uses ad-hoc signing and is not Apple-notarized. On first launch,
            Control-click NotesFlash in Finder, choose Open, then confirm Open.
